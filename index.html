<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🎵 My Music Player</h1>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Sidebar - Playlists -->
            <aside class="sidebar">
                <div class="playlist-section">
                    <h3>Playlists</h3>
                    <div class="playlist-list">
                        <button class="playlist-btn active" data-category="all">All Songs</button>
                        <button class="playlist-btn" data-category="rock">Rock</button>
                        <button class="playlist-btn" data-category="pop">Pop</button>
                        <button class="playlist-btn" data-category="jazz">Jazz</button>
                        <button class="playlist-btn" data-category="classical">Classical</button>
                        <button class="playlist-btn" data-category="favorites">❤️ Favorites</button>
                    </div>
                </div>
            </aside>

            <!-- Center Content -->
            <div class="center-content">
                <!-- Player Display -->
                <div class="player-display">
                    <div class="album-art">
                        <div class="album-placeholder">🎵</div>
                    </div>
                    <div class="song-info">
                        <h2 id="songTitle">Select a song</h2>
                        <p id="songArtist">Artist Name</p>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="progress-section">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                        <input type="range" class="progress-input" id="progressInput" min="0" max="100" value="0">
                    </div>
                    <span id="duration">0:00</span>
                </div>

                <!-- Player Controls -->
                <div class="controls">
                    <button id="prevBtn" class="control-btn" title="Previous">⏮️</button>
                    <button id="playBtn" class="control-btn play-btn" title="Play">▶️</button>
                    <button id="nextBtn" class="control-btn" title="Next">⏭️</button>
                </div>

                <!-- Volume Control -->
                <div class="volume-section">
                    <span>🔊</span>
                    <input type="range" id="volumeControl" class="volume-slider" min="0" max="100" value="70">
                    <span id="volumePercent">70%</span>
                </div>

                <!-- Search Bar -->
                <div class="search-section">
                    <input type="text" id="searchInput" class="search-bar" placeholder="Search songs, artists...">
                </div>

                <!-- Playlist Display -->
                <div class="playlist-display">
                    <h3>Current Playlist</h3>
                    <div class="song-list" id="songList">
                        <!-- Songs will be populated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Hidden Audio Element -->
        <audio id="audioPlayer"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
